<section class="add-item">
  <h2>Add to shopping list</h2>
  <form (ngSubmit)="add()">
    <input name="name" [(ngModel)]="newName" placeholder="What do you need?" required />
    <select name="category" [(ngModel)]="newCategory">
      @for (c of categories; track c) {
        <option [value]="c">{{ c }}</option>
      }
    </select>
    <input name="quantity" type="number" min="1" [(ngModel)]="newQuantity" />
    <button type="submit">Add</button>
  </form>
</section>

<section class="list">
  <h2>To buy</h2>
  @if (loading()) {
    <p>Loading…</p>
  } @else if (items().length === 0) {
    <p>Shopping list is empty.</p>
  } @else {
    <ul>
      @for (item of items(); track item.id) {
        <li>
          <label>
            <input type="checkbox" (change)="purchase(item)" />
            {{ item.name }}
            <span class="meta">× {{ item.quantity }} · {{ item.category }}</span>
          </label>
        </li>
      }
    </ul>
  }
</section>
