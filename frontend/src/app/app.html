<header>
  <h1>Household Inventory</h1>
  @if (auth.isLoggedIn()) {
    <nav>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Inventory</a>
      <a routerLink="/shopping-list" routerLinkActive="active">Shopping lists</a>
    </nav>
    <div class="user">
      {{ auth.user()?.displayName || auth.user()?.username }}
      <button (click)="auth.logout()">Sign out</button>
    </div>
  }
</header>

<main>
  <router-outlet />
</main>
