spring.application.name=inventory-backend

# Dev default: file-based H2 so data survives restarts. No setup needed.
spring.datasource.url=jdbc:h2:file:./data/inventory
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# JWT auth. Override the secret in production: JWT_SECRET env var (32+ chars).
app.jwt.secret=${JWT_SECRET:dev-only-secret-change-me-0123456789abcdef}
app.jwt.expiry-hours=72

# Production: run with --spring.profiles.active=postgres
# (see application-postgres.properties)
